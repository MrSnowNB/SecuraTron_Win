author: human
created: '2026-04-25T16:52:00-04:00'
description: Perform network service discovery and fingerprinting using nmap.
id: kali.nmap
implementation:
  cmd: nmap {flags} -oX - {target}
  kind: shell
inputs:
  flags:
    default: -sV -Pn -T3
    type: string
  target:
    required: true
    type: string
    validator: rfc1123_host_or_cidr
kind: atom
outputs:
  artifact_path: '{session}/artifacts/nmap-{ts}.xml'
  fallback_artifact_path: ~/.securatron/inbox/nmap-{ts}.xml
  type: nmap.scan.v1
postconditions:
- artifact_exists(outputs.artifact_path)
- result.hosts|length > 0
preconditions:
- scope.includes(inputs.target)
- network.reachable(inputs.target)
promotion:
  required_distinct_inputs: 3
  required_success: 3
  requires_human_review: false
reversible: true
risk: low
side_effects:
- network_probe
tier: global
trials:
  failure: 0
  last_run: '2026-04-26T11:43:00-04:00'
  success: 3
version: 1
