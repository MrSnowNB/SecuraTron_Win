author: hermes
created: '2026-04-26T17:00:00-04:00'
description: Web directory enumeration using Gobuster — discovers hidden directories and files on web servers.
id: web.gobuster
implementation:
  cmd: gobuster dir -u http://{target} -w {wordlist} {flags}
  kind: shell
inputs:
  flags:
    default: -f --no-error -q -t 10
    type: string
  target:
    required: true
    type: string
    validator: rfc1123_host_or_ip
  wordlist:
    default: /usr/share/wordlists/dirb/small.txt
    type: string
kind: atom
outputs:
  artifact_path: '{session}/artifacts/gobuster-{ts}.raw'
  type: shell.run.v1
postconditions:
- artifact_exists(outputs.artifact_path)
- result|length > 0
preconditions:
- scope.includes(inputs.target)
- network.reachable(inputs.target)
promotion:
  required_distinct_inputs: 3
  required_success: 3
  requires_human_review: false
reversible: true
risk: low
side_effects:
- network_probe
tier: global
trials:
  failure: 0
  last_run: null
  success: 0
version: 1
