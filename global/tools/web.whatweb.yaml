author: hermes
created: '2026-04-26T16:30:00-04:00'
description: Web technology fingerprinting using WhatWeb — identifies CMS, frameworks, widgets, and other web technologies.
id: web.whatweb
implementation:
  cmd: whatweb {flags} http://{target} --log-json /dev/stdout
  kind: shell
inputs:
  flags:
    default: -a 3
    type: string
  target:
    required: true
    type: string
    validator: rfc1123_host_or_ip
kind: atom
outputs:
  artifact_path: '{session}/artifacts/whatweb-{ts}.json'
  type: whatweb.fingerprint.v1
postconditions:
- artifact_exists(outputs.artifact_path)
- result|length > 0
preconditions:
- scope.includes(inputs.target)
- network.reachable(inputs.target)
promotion:
  required_distinct_inputs: 3
  required_success: 3
  requires_human_review: false
reversible: true
risk: low
side_effects:
- network_probe
tier: global
trials:
  failure: 0
  last_run: null
  success: 0
version: 1
