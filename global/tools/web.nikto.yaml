id: web.nikto
kind: atom
tier: global
version: 1
author: hermes
description: Web server vulnerability scanning using Nikto — checks for 6000+ potentially dangerous files, misconfigurations, and outdated software.

implementation:
  kind: shell
  cmd: mkdir -p sessions/{session}/artifacts && nikto -host {target} -nolookup -nocheck -maxtime 15s -Format json -output sessions/{session}/artifacts/nikto-{ts} {flags}

execution:
  timeout_seconds: 60

inputs:
  target:
    type: string
    required: true
    validator: rfc1123_host_or_ip
  flags:
    type: string
    default: -Tuning 23b

outputs:
  artifact_path: sessions/{session}/artifacts/nikto-{ts}.json
  type: nikto.scan.v1

preconditions:
- scope.includes(inputs.target)
- network.reachable(inputs.target)

postconditions:
- artifact_exists(outputs.artifact_path)

risk: low
side_effects:
- network_probe
reversible: true
promotion:
  required_success: 3
  required_distinct_inputs: 3
  requires_human_review: false
trials:
  success: 0
  failure: 0
  last_run: null
